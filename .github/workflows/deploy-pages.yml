# Build on main → publish to gh-pages branch.
# Settings → Pages → Deploy from branch → gh-pages / (root)

name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html workflow-demo.html _site/
          cp -r platform pages _site/
          touch _site/.nojekyll
          if [ -f CNAME ]; then
            cp CNAME _site/
          else
            echo "reva.linm-soft.com" > _site/CNAME
          fi
          echo "Site files:"
          find _site -maxdepth 2 -type f | head -30

      - name: Deploy to gh-pages branch
        shell: bash
        env:
          # Optional PAT with repo scope; falls back to GITHUB_TOKEN from permissions above
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN || github.token }}
        run: |
          set -euo pipefail
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${{ github.sha }}"
          git remote add origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin HEAD:gh-pages
