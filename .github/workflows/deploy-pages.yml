# Build on main → publish to gh-pages branch.
# Works with Settings → Pages → "Deploy from branch" → gh-pages / (root).
# No "GitHub Actions" Pages source required (avoids queue / environment issues).

name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html workflow-demo.html CNAME _site/
          cp -r platform pages _site/
          touch _site/.nojekyll
          echo "Site files:"
          find _site -maxdepth 2 -type f | head -30

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          commit_message: "deploy: ${{ github.sha }}"
