# Deploy static site to GitHub Pages on every push to main.
# After merge: Settings → Pages → Source = "GitHub Actions" (not "Deploy from branch").

name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir _site
          cp index.html workflow-demo.html CNAME _site/
          cp -r platform pages _site/
          if [ -f .nojekyll ]; then cp .nojekyll _site/; else touch _site/.nojekyll; fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
