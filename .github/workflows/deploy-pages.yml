# Build on main → publish to gh-pages branch.
# Settings → Pages → Deploy from branch → gh-pages / (root)

name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html workflow-demo.html _site/
          cp -r platform pages _site/
          touch _site/.nojekyll
          if [ -f CNAME ]; then
            cp CNAME _site/
          else
            echo "reva.linm-soft.com" > _site/CNAME
          fi
          echo "Site files:"
          find _site -maxdepth 2 -type f | head -30

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          commit_message: "deploy: ${{ github.sha }}"
